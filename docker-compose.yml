version: '3.8'

services:
  app:
    build: .
    ports:
      - "3333:3333"
    volumes:
      - .:/app
      - storage:/app/storage
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_DATABASE=brand_ai

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: brand_ai
    ports:
      - "5432:5432"

volumes:
  storage: